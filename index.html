<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 8/03 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Pinyon+Script&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    height:100vh;
    background:linear-gradient(135deg,#2b0f18,#5a1e2e,#8c2f45);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Playfair Display',serif;
}

/* Card container */
.card{
    width:340px;
    height:480px;
    position:relative;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
    cursor:pointer;
}

/* Faces */
.card-face{
    position:absolute;
    width:100%;
    height:100%;
    padding:30px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    transition:transform 0.8s ease;
}

/* Front */
.front{
    background:linear-gradient(145deg,#b31232,#ff4d6d);
    color:white;
    z-index:2;
}

/* Back */
.back{
    background:#fff0f3;
    color:#7a1c33;
    transform:translateX(100%);
}

/* Open state */
.card.open .front{
    transform:translateX(-100%);
}

.card.open .back{
    transform:translateX(0);
}

.front h1{
    font-size:26px;
    margin-bottom:15px;
}

.front .signature{
    font-family:'Pinyon Script',cursive;
    font-size:28px;
}

.back h2{
    margin-bottom:20px;
}

.lux-sign{
    margin-top:25px;
    font-family:'Pinyon Script',cursive;
    font-size:32px;
}

/* Hearts */
.heart{
    position:absolute;
    font-size:20px;
    animation:floatUp 4s linear forwards;
    pointer-events:none;
}
@keyframes floatUp{
    from{transform:translateY(0);opacity:1}
    to{transform:translateY(-600px);opacity:0}
}

@media(max-width:420px){
    .card{
        width:90%;
        height:460px;
    }
}
</style>
</head>

<body>

<div class="card" id="loveCard">
    <div class="card-face front">
        <h1>💌 Happy 8/03 💌</h1>
        <div class="signature">— With Love 💘</div>
    </div>

    <div class="card-face back">
        <h2 id="receiverName">Gửi em ❤️</h2>
        <div>
            Chúc em một ngày 8/03 thật rực rỡ và hạnh phúc.<br><br>
            Mong rằng mỗi ngày của em đều tràn ngập yêu thương 💖
        </div>
        <div class="lux-sign">— Ly 💋</div>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
if(name){
    document.getElementById("receiverName").innerText = "Gửi " + name + " ❤️";
}

const card = document.getElementById("loveCard");
let opened = false;

card.onclick = function(){
    if(opened) return;
    opened = true;
    card.classList.add("open");
    createHearts();
};

function createHearts(){
    for(let i=0;i<12;i++){
        const heart = document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        heart.style.bottom="0px";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),4000);
    }
}
</script>

</body>
</html>
